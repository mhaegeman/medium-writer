name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'prompts/writer_system.md'
      - '.github/workflows/deploy-gh-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel any in-progress run on a new push
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      # Keep docs/writer_system.md in sync with the canonical prompt file
      # without committing a duplicate into the repo.
      - name: Sync writer_system.md into docs/
        run: cp prompts/writer_system.md docs/writer_system.md

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - uses: actions/deploy-pages@v4
        id: deployment
